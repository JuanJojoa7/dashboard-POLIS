<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero POLIS Cali 2026</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="header">
  <div class="header-brand">
    <div class="header-icon"><span>&#x1F4CA;</span></div>
    <div class="header-text">
      <h1>Encuesta CaliBrando &mdash; Pilotaje Cali</h1>
      <p>Tablero interactivo &middot; POLIS &middot; 2026</p>
    </div>
  </div>
  <div class="hkpis">
    <div class="hkpi"><div class="v" id="hn">18</div><div class="l">Encuestados</div></div>
    <div class="hkpi"><div class="v" id="hpct">100%</div><div class="l">Filtrado</div></div>
    <div class="hkpi"><div class="v">16</div><div class="l">Secciones</div></div>
  </div>
</div>
<div class="fbar">
  <label>Sexo<select id="fsx"><option value="">Todos</option><option value="Hombre">Hombre</option><option value="Mujer">Mujer</option></select></label>
  <label>Etnia<select id="fet"><option value="">Todos</option><option value="Indígena">Indígena</option><option value="Gitano">Gitano</option><option value="Raizal">Raizal</option><option value="Palenquero">Palenquero</option><option value="Afrocolombiano">Afrocolombiano</option><option value="Ninguna">Ninguna</option></select></label>
  <label>Estado civil<select id="fcv"><option value="">Todos</option><option value="Viudo/a">Viudo/a</option><option value="Casado/a">Casado/a</option><option value="Unión libre">Unión libre</option><option value="Soltero/a">Soltero/a</option><option value="Separado/a">Separado/a</option></select></label>
  <label>NSE<select id="fns"><option value="">Todos</option><option value="1">Estrato 1</option><option value="2">Estrato 2</option><option value="3">Estrato 3</option><option value="4">Estrato 4</option><option value="5">Estrato 5</option><option value="6">Estrato 6</option></select></label>
  <label>Educaci&oacute;n<select id="fed"><option value="">Todos</option><option value="Doctorado">Doctorado</option><option value="Maestría">Maestría</option><option value="Especialización">Especialización</option><option value="Universitario">Universitario</option><option value="Técnico/Tecnológico">Técnico/Tecnológico</option><option value="Bachillerato/Secundaria">Bachillerato/Secundaria</option></select></label>
  <div class="fcnt" id="fcnt">n = 18</div>
  <button class="frst" id="f-reset">&#x21BA; Limpiar</button>
</div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

<script src="js/core.js"></script>
<script src="js/sections/manifest.js"></script>
<script src="js/sections/loader.js"></script>
<script src="js/app.js"></script>/
</body>
</html>
